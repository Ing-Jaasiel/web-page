    <script>
        function abrirCertificado(ruta) {
            document.getElementById('imagen-certificado').src = ruta;
            document.getElementById('modal-certificado').style.display = "block";
        }

        function cerrarCertificado() {
            document.getElementById('modal-certificado').style.display = "none";
        }

        // Cerrar el modal si se hace clic fuera de la imagen
        window.onclick = function(event) {
            if (event.target == document.getElementById('modal-certificado')) {
                document.getElementById('modal-certificado').style.display = "none";
            }
        }
    </script>
